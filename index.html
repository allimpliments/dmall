<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dmall Calculater</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8b5cf6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dmall Calculater">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Your existing styles remain exactly the same */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-gradient: radial-gradient(circle at 10% 20%, rgba(139,92,246,0.08), rgba(0,0,0,0) 70%);
      --surface: rgba(255, 255, 255, 0.9);
      --surface-2: rgba(248, 250, 252, 0.8);
      --text: #0f172a;
      --text-light: #334155;
      --border: rgba(226, 232, 240, 0.6);
      --primary: #8b5cf6;
      --primary-dark: #7c3aed;
      --primary-glow: rgba(139,92,246,0.4);
      --accent: #f59e0b;
      --danger: #ef4444;
      --shadow-sm: 0 8px 20px -6px rgba(0,0,0,0.08);
      --shadow-md: 0 20px 30px -12px rgba(0,0,0,0.12);
      --shadow-glow: 0 0 0 1px rgba(139,92,246,0.2), 0 10px 30px -5px rgba(139,92,246,0.3);
      --blur: blur(12px);
      --radius-xl: 28px;
    }
    body.dark {
      --surface: rgba(30, 41, 59, 0.85);
      --surface-2: rgba(15, 23, 42, 0.8);
      --text: #f1f5f9;
      --text-light: #cbd5e1;
      --border: rgba(51, 65, 85, 0.8);
      --bg-gradient: radial-gradient(circle at 10% 20%, rgba(139,92,246,0.15), rgba(0,0,0,0.3));
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-gradient), #f8fafc; color: var(--text); padding: 1rem; min-height: 100vh; backdrop-filter: var(--blur); transition: all 0.3s ease; }
    body.dark { background: var(--bg-gradient), #0b1120; }
    .container { max-width: 880px; margin: 0 auto; }
    .glass-card { background: var(--surface); backdrop-filter: var(--blur); border-radius: var(--radius-xl); padding: 1.8rem; margin-bottom: 1.8rem; border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: transform 0.25s ease, box-shadow 0.3s ease; }
    .glass-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .card-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #a78bfa, #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.02em; }
    h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem; letter-spacing: -0.3px; }
    .badge { background: var(--primary); padding: 0.2rem 0.9rem; border-radius: 40px; font-size: 0.7rem; font-weight: 600; color: white; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .input-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.4rem; color: var(--text-light); }
    input, select { width: 100%; padding: 0.85rem 1.2rem; border-radius: 2rem; border: 1px solid var(--border); background: var(--surface-2); color: var(--text); font-size: 0.95rem; font-weight: 500; outline: none; transition: all 0.2s; backdrop-filter: blur(4px); }
    input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); transform: scale(1.01); }
    .row-flex { display: flex; gap: 1rem; flex-wrap: wrap; }
    .radio-group { display: flex; gap: 0.8rem; flex-wrap: wrap; margin: 0.6rem 0 1.2rem; }
    .radio-option { flex: 1; min-width: 100px; }
    .radio-option input { display: none; }
    .radio-option label { display: block; background: var(--surface-2); backdrop-filter: blur(4px); border: 1px solid var(--border); border-radius: 2rem; padding: 0.7rem 0.3rem; text-align: center; cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: all 0.2s cubic-bezier(0.2,0.9,0.4,1.1); }
    .radio-option label:hover { transform: translateY(-2px); background: var(--primary); color: white; border-color: var(--primary); }
    .radio-option input:checked + label { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-color: transparent; box-shadow: 0 8px 20px -8px var(--primary); }
    .breakdown { background: var(--surface-2); backdrop-filter: blur(4px); border-radius: 1.5rem; padding: 1.2rem; margin: 1.2rem 0; }
    .row { display: flex; justify-content: space-between; padding: 0.7rem 0; border-bottom: 1px dashed var(--border); font-size: 0.9rem; font-weight: 500; }
    .row.warning { color: var(--danger); font-weight: 700; background: rgba(239,68,68,0.1); border-radius: 1rem; padding: 0.5rem 0.7rem; margin: 0.5rem 0; }
    .final-price { background: linear-gradient(135deg, #8b5cf6, #ec4899); border-radius: 2rem; padding: 1.2rem 1.8rem; display: flex; justify-content: space-between; align-items: center; color: white; margin-top: 1.2rem; box-shadow: var(--shadow-glow); transition: all 0.2s; }
    .final-price:hover { transform: scale(1.01); }
    .final-price .price { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
    button { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; padding: 0.75rem 1.6rem; border-radius: 3rem; font-weight: 600; font-size: 0.85rem; color: white; cursor: pointer; display: inline-flex; align-items: center; gap: 0.6rem; transition: all 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    button:hover { transform: translateY(-2px); filter: brightness(1.05); box-shadow: 0 12px 20px -12px var(--primary); }
    button:active { transform: translateY(1px); }
    button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); box-shadow: none; }
    button.danger { background: transparent; color: var(--danger); border-color: var(--danger); }
    .button-group { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-top: 1.2rem; }
    .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.2rem; }
    @media (max-width: 650px) { .glass-card { padding: 1.2rem; } .final-price .price { font-size: 1.5rem; } }
    #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) scale(0.9); background: #1e293b; color: white; padding: 0.6rem 1.2rem; border-radius: 3rem; font-size: 0.8rem; opacity: 0; transition: all 0.2s; pointer-events: none; z-index: 1000; backdrop-filter: blur(8px); }
    /* New Styles for Install Button */
    .install-btn-container { text-align: center; margin-top: 1.5rem; }
    .btn-install { background: linear-gradient(135deg, #10b981, #059669); font-size: 1rem; padding: 0.9rem 1.8rem; }
    .btn-install:hover { box-shadow: 0 12px 20px -12px #10b981; }
  </style>
</head>
<body>
<div class="container">
  <div class="glass-card">
    <div class="card-header">
      <h2>✨ Dmall Calculater</h2>
      <button id="darkToggle" class="secondary">🌙 Dark Mode</button>
    </div>
  </div>
  <!-- Main calculator (your existing UI remains intact) -->
  <div class="glass-card">
    <h3>💰 Cost Inputs</h3>
    <div class="row-flex">
      <div class="input-group" style="flex:2"><label>Product Cost (₹)</label><input type="number" id="productCost" value="500" step="1"></div>
      <div class="input-group" style="flex:1"><label>Quantity</label><input type="number" id="quantity" value="3" min="1" step="1"></div>
    </div>
    <div class="input-group"><label>Packaging Cost (per unit)</label><input type="number" id="packagingCost" value="0" step="1"></div>
    <label>🚚 Shipping Calculation Mode</label>
    <div class="radio-group" id="shippingModeGroup">
      <div class="radio-option"><input type="radio" name="shipMode" id="shipFixed" value="fixed" checked><label for="shipFixed">Fixed</label></div>
      <div class="radio-option"><input type="radio" name="shipMode" id="shipQty" value="perQty"><label for="shipQty">Per Quantity</label></div>
      <div class="radio-option"><input type="radio" name="shipMode" id="shipWeight" value="weight"><label for="shipWeight">Weight (kg)</label></div>
      <div class="radio-option"><input type="radio" name="shipMode" id="shipDim" value="dim"><label for="shipDim">Dimensional</label></div>
    </div>
    <div id="shippingDynamicFields">
      <div class="input-group"><label>Shipping Cost (₹)</label><input type="number" id="fixedShipping" value="40" step="1"></div>
    </div>
    <label>📍 Delivery Type (preset)</label>
    <div class="radio-group" id="deliveryGroup">
      <div class="radio-option"><input type="radio" name="delivery" id="delLocal" value="local" checked><label for="delLocal">Local</label></div>
      <div class="radio-option"><input type="radio" name="delivery" id="delState" value="state"><label for="delState">State</label></div>
      <div class="radio-option"><input type="radio" name="delivery" id="delPan" value="pan"><label for="delPan">Pan India</label></div>
    </div>
    <div class="breakdown" id="breakdownArea"></div>
    <div class="final-price">
      <span>🏷️ FINAL SELLING PRICE</span>
      <span class="price" id="finalPriceSpan">₹0</span>
    </div>
    <div class="button-group">
      <button id="copyBtn">📋 Copy Price</button>
      <button id="recalcBtn">⟳ Recalculate</button>
      <button id="resetBtn" class="danger">⟳ Reset</button>
    </div>
  </div>
  <!-- Advanced settings -->
  <div class="glass-card">
    <div class="card-header"><h3>⚙️ Business Settings</h3><span class="badge">auto-save</span></div>
    <div class="settings-grid">
      <div class="input-group"><label>Gateway %</label><input type="number" id="gatewayPct" value="2" step="0.1"></div>
      <div class="input-group"><label>COD Charge (₹)</label><input type="number" id="codCharge" value="25" step="1"></div>
      <div class="input-group"><label>RTO Buffer %</label><input type="number" id="rtoPct" value="5" step="0.5"></div>
      <div class="input-group"><label>Profit Margin %</label><input type="number" id="profitPct" value="25" step="0.5"></div>
      <div class="input-group"><label>GST %</label><input type="number" id="gstPct" value="0" step="1"></div>
      <div class="input-group"><label>Profit on</label><select id="profitMode"><option value="cost">Subtotal</option><option value="selling">Selling Price</option></select></div>
    </div>
    <div class="settings-grid" style="margin-top:1.2rem">
      <div class="input-group"><label>Local default (₹)</label><input type="number" id="shipLocalDef" value="40"></div>
      <div class="input-group"><label>State default (₹)</label><input type="number" id="shipStateDef" value="70"></div>
      <div class="input-group"><label>Pan default (₹)</label><input type="number" id="shipPanDef" value="100"></div>
    </div>
    <div class="settings-grid" style="margin-top:1.2rem">
      <div class="input-group"><label>Weight rate (₹/kg)</label><input type="number" id="weightRate" value="50" step="5"></div>
      <div class="input-group"><label>Dim factor (cm³/kg)</label><input type="number" id="dimFactor" value="5000" step="100"></div>
    </div>
    <div class="row-flex" style="margin-top:1.5rem; justify-content: space-between;">
      <button id="exportBtn" class="secondary">📤 Export JSON</button>
      <button id="importBtn" class="secondary">📥 Import JSON</button>
      <input type="file" id="importFile" style="display:none">
    </div>
  </div>
  <!-- New Install Button Container -->
  <div class="install-btn-container" id="installContainer" style="display: none;">
    <button id="installAppBtn" class="btn-install">📲 Install Dmall Calculater</button>
  </div>
</div>
<div id="toast">✨ Copied!</div>

<script>
  /* Your existing JavaScript for calculation logic remains exactly the same */
  // DOM Elements
  const productInput = document.getElementById('productCost');
  const qtyInput = document.getElementById('quantity');
  const packagingInput = document.getElementById('packagingCost');
  const gatewayPct = document.getElementById('gatewayPct');
  const codCharge = document.getElementById('codCharge');
  const rtoPct = document.getElementById('rtoPct');
  const profitPct = document.getElementById('profitPct');
  const gstPct = document.getElementById('gstPct');
  const profitMode = document.getElementById('profitMode');
  const shipLocalDef = document.getElementById('shipLocalDef');
  const shipStateDef = document.getElementById('shipStateDef');
  const shipPanDef = document.getElementById('shipPanDef');
  const weightRate = document.getElementById('weightRate');
  const dimFactor = document.getElementById('dimFactor');
  const deliveryRadios = { local: document.getElementById('delLocal'), state: document.getElementById('delState'), pan: document.getElementById('delPan') };
  const shippingRadios = { fixed: document.getElementById('shipFixed'), perQty: document.getElementById('shipQty'), weight: document.getElementById('shipWeight'), dim: document.getElementById('shipDim') };
  const dynamicDiv = document.getElementById('shippingDynamicFields');
  const breakdownDiv = document.getElementById('breakdownArea');
  const finalSpan = document.getElementById('finalPriceSpan');
  const copyBtn = document.getElementById('copyBtn');
  const resetBtn = document.getElementById('resetBtn');
  const recalcBtn = document.getElementById('recalcBtn');
  const darkToggle = document.getElementById('darkToggle');
  const exportBtn = document.getElementById('exportBtn');
  const importBtn = document.getElementById('importBtn');
  const importFile = document.getElementById('importFile');
  const toast = document.getElementById('toast');
  let currentDelivery = 'local';
  let currentShipMode = 'fixed';

  function showToast(msg) { toast.innerText = msg; toast.style.opacity = '1'; toast.style.transform = 'translateX(-50%) scale(1)'; setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(-50%) scale(0.9)'; }, 1500); }

  function getShippingValue() {
    const qty = Math.max(1, parseInt(qtyInput.value) || 1);
    if (currentShipMode === 'fixed') { const val = parseFloat(document.getElementById('fixedShipping')?.value) || 0; return val; }
    else if (currentShipMode === 'perQty') { const perUnit = parseFloat(document.getElementById('fixedShipping')?.value) || 0; return perUnit * qty; }
    else if (currentShipMode === 'weight') { const wpu = parseFloat(document.getElementById('weightPerUnit')?.value) || 0; const rate = parseFloat(weightRate.value) || 0; return wpu * qty * rate; }
    else if (currentShipMode === 'dim') { const l = parseFloat(document.getElementById('dimLength')?.value) || 0; const w = parseFloat(document.getElementById('dimWidth')?.value) || 0; const h = parseFloat(document.getElementById('dimHeight')?.value) || 0; const factor = parseFloat(dimFactor.value) || 5000; const volKg = (l * w * h) / factor; const rate = parseFloat(weightRate.value) || 0; return volKg * qty * rate; }
    return 0;
  }

  function updateShippingUI() {
    let html = '';
    if (currentShipMode === 'fixed' || currentShipMode === 'perQty') {
      const currentVal = document.getElementById('fixedShipping')?.value || '40';
      const label = currentShipMode === 'fixed' ? 'Shipping Cost (₹)' : 'Shipping per unit (₹)';
      html = `<div class="input-group"><label>${label}</label><input type="number" id="fixedShipping" value="${currentVal}" step="1"></div>`;
    } else if (currentShipMode === 'weight') {
      const wval = document.getElementById('weightPerUnit')?.value || '0.5';
      html = `<div class="input-group"><label>Weight per unit (kg)</label><input type="number" id="weightPerUnit" value="${wval}" step="0.1"></div>`;
    } else if (currentShipMode === 'dim') {
      const lval = document.getElementById('dimLength')?.value || '30';
      const wval = document.getElementById('dimWidth')?.value || '20';
      const hval = document.getElementById('dimHeight')?.value || '10';
      html = `<div class="row-flex"><div class="input-group"><label>Length (cm)</label><input type="number" id="dimLength" value="${lval}" step="1"></div><div class="input-group"><label>Width (cm)</label><input type="number" id="dimWidth" value="${wval}" step="1"></div><div class="input-group"><label>Height (cm)</label><input type="number" id="dimHeight" value="${hval}" step="1"></div></div>`;
    }
    dynamicDiv.innerHTML = html;
    const inputs = dynamicDiv.querySelectorAll('input');
    inputs.forEach(inp => inp.addEventListener('input', () => calculateAndRender()));
    calculateAndRender();
  }

  function setShippingMode(mode) {
    currentShipMode = mode;
    if (mode === 'fixed') shippingRadios.fixed.checked = true;
    else if (mode === 'perQty') shippingRadios.perQty.checked = true;
    else if (mode === 'weight') shippingRadios.weight.checked = true;
    else shippingRadios.dim.checked = true;
    updateShippingUI();
    if (mode === 'fixed') syncFixedWithDelivery();
  }

  function syncFixedWithDelivery() {
    if (currentShipMode === 'fixed') {
      const defs = { local: parseFloat(shipLocalDef.value)||0, state: parseFloat(shipStateDef.value)||0, pan: parseFloat(shipPanDef.value)||0 };
      const newVal = defs[currentDelivery];
      const fixedInput = document.getElementById('fixedShipping');
      if (fixedInput) fixedInput.value = newVal;
      calculateAndRender();
    }
  }

  function setDelivery(type) {
    currentDelivery = type;
    if (type === 'local') deliveryRadios.local.checked = true;
    else if (type === 'state') deliveryRadios.state.checked = true;
    else deliveryRadios.pan.checked = true;
    if (currentShipMode === 'fixed') syncFixedWithDelivery();
    else calculateAndRender();
  }

  function computeINR() {
    const product = parseFloat(productInput.value) || 0;
    const qty = Math.max(1, parseInt(qtyInput.value) || 1);
    const packaging = (parseFloat(packagingInput.value) || 0) * qty;
    const shipping = getShippingValue();
    const baseCost = product * qty + packaging + shipping;
    const gateway = baseCost * ((parseFloat(gatewayPct.value)||0)/100);
    const rto = baseCost * ((parseFloat(rtoPct.value)||0)/100);
    const cod = parseFloat(codCharge.value) || 0;
    const gst = baseCost * ((parseFloat(gstPct.value)||0)/100);
    const subtotal = baseCost + gateway + rto + cod + gst;
    let profitRate = (parseFloat(profitPct.value)||0)/100;
    let profit = 0, finalRaw = 0;
    if (profitMode.value === 'cost') {
      profit = subtotal * profitRate;
      finalRaw = subtotal + profit;
    } else {
      if (profitRate >= 0.99) profitRate = 0.99;
      finalRaw = subtotal / (1 - profitRate);
      profit = finalRaw - subtotal;
    }
    const finalRounded = Math.ceil(finalRaw / 10) * 10;
    return { product, qty, packaging, shipping, baseCost, gateway, rto, cod, gst, subtotal, profit, finalRounded, isLoss: finalRounded < baseCost };
  }

  function calculateAndRender() {
    const data = computeINR();
    const fmt = (v) => `₹ ${v.toFixed(2)}`;
    const lossWarning = data.isLoss ? `<div class="row warning">⚠️ WARNING: Selling price below total cost! Loss making.</div>` : '';
    breakdownDiv.innerHTML = `
      <div class="row"><span>📦 Product (${data.qty} x ₹${data.product.toFixed(2)})</span><span>${fmt(data.product * data.qty)}</span></div>
      <div class="row"><span>📦 Packaging (${data.qty} x ₹${(parseFloat(packagingInput.value)||0).toFixed(2)})</span><span>${fmt(data.packaging)}</span></div>
      <div class="row"><span>🚚 Shipping (${currentShipMode.toUpperCase()})</span><span>${fmt(data.shipping)}</span></div>
      <div class="row"><span>💰 Base Cost</span><span>${fmt(data.baseCost)}</span></div>
      <div class="row"><span>💳 Gateway (${gatewayPct.value}%)</span><span>${fmt(data.gateway)}</span></div>
      <div class="row"><span>🔄 RTO (${rtoPct.value}%)</span><span>${fmt(data.rto)}</span></div>
      <div class="row"><span>💵 COD Charge</span><span>${fmt(data.cod)}</span></div>
      <div class="row"><span>🧾 GST (${gstPct.value}%)</span><span>${fmt(data.gst)}</span></div>
      <div class="row"><span>📊 Subtotal (before profit)</span><span>${fmt(data.subtotal)}</span></div>
      <div class="row"><span>📈 Profit (${profitPct.value}% on ${profitMode.value === 'cost' ? 'subtotal' : 'selling'})</span><span>${fmt(data.profit)}</span></div>
      ${lossWarning}
      <div class="row" style="border-top:2px solid var(--border); margin-top:0.5rem; padding-top:0.7rem; font-weight:800;"><span>✨ FINAL PRICE (rounded up to ₹10)</span><span>${fmt(data.finalRounded)}</span></div>
    `;
    finalSpan.innerText = `₹ ${data.finalRounded}`;
  }

  function persistAll() {
    const settings = {
      gatewayPct: gatewayPct.value, codCharge: codCharge.value, rtoPct: rtoPct.value,
      profitPct: profitPct.value, gstPct: gstPct.value, profitMode: profitMode.value,
      shipLocalDef: shipLocalDef.value, shipStateDef: shipStateDef.value, shipPanDef: shipPanDef.value,
      weightRate: weightRate.value, dimFactor: dimFactor.value
    };
    localStorage.setItem('dropship_ultimate', JSON.stringify(settings));
  }
  function loadAll() {
    const saved = localStorage.getItem('dropship_ultimate');
    if (saved) {
      try {
        const s = JSON.parse(saved);
        gatewayPct.value = s.gatewayPct ?? 2; codCharge.value = s.codCharge ?? 25; rtoPct.value = s.rtoPct ?? 5;
        profitPct.value = s.profitPct ?? 25; gstPct.value = s.gstPct ?? 0; profitMode.value = s.profitMode ?? 'cost';
        shipLocalDef.value = s.shipLocalDef ?? 40; shipStateDef.value = s.shipStateDef ?? 70; shipPanDef.value = s.shipPanDef ?? 100;
        weightRate.value = s.weightRate ?? 50; dimFactor.value = s.dimFactor ?? 5000;
      } catch(e) {}
    }
  }

  function bindEvents() {
    productInput.addEventListener('input', calculateAndRender);
    qtyInput.addEventListener('input', calculateAndRender);
    packagingInput.addEventListener('input', calculateAndRender);
    shippingRadios.fixed.addEventListener('change', () => { if(shippingRadios.fixed.checked) setShippingMode('fixed'); });
    shippingRadios.perQty.addEventListener('change', () => { if(shippingRadios.perQty.checked) setShippingMode('perQty'); });
    shippingRadios.weight.addEventListener('change', () => { if(shippingRadios.weight.checked) setShippingMode('weight'); });
    shippingRadios.dim.addEventListener('change', () => { if(shippingRadios.dim.checked) setShippingMode('dim'); });
    deliveryRadios.local.addEventListener('change', () => { if(deliveryRadios.local.checked) setDelivery('local'); });
    deliveryRadios.state.addEventListener('change', () => { if(deliveryRadios.state.checked) setDelivery('state'); });
    deliveryRadios.pan.addEventListener('change', () => { if(deliveryRadios.pan.checked) setDelivery('pan'); });
    const settingsInputs = [gatewayPct, codCharge, rtoPct, profitPct, gstPct, profitMode, shipLocalDef, shipStateDef, shipPanDef, weightRate, dimFactor];
    settingsInputs.forEach(inp => inp.addEventListener('input', () => { persistAll(); if(currentShipMode === 'fixed') syncFixedWithDelivery(); else calculateAndRender(); }));
    recalcBtn.addEventListener('click', calculateAndRender);
    copyBtn.addEventListener('click', async () => { let price = finalSpan.innerText.replace(/[^0-9.-]/g, ''); await navigator.clipboard.writeText(price); showToast('✅ Price copied!'); });
    resetBtn.addEventListener('click', () => { productInput.value = '500'; qtyInput.value = '3'; packagingInput.value = '0'; setShippingMode('fixed'); setDelivery('local'); syncFixedWithDelivery(); calculateAndRender(); });
    exportBtn.addEventListener('click', () => { const data = { gatewayPct: gatewayPct.value, codCharge: codCharge.value, rtoPct: rtoPct.value, profitPct: profitPct.value, gstPct: gstPct.value, profitMode: profitMode.value, shipLocalDef: shipLocalDef.value, shipStateDef: shipStateDef.value, shipPanDef: shipPanDef.value, weightRate: weightRate.value, dimFactor: dimFactor.value }; const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)], {type:'application/json'})); a.download = 'dropship_settings.json'; a.click(); URL.revokeObjectURL(a.href); showToast('Settings exported'); });
    importBtn.addEventListener('click', () => importFile.click());
    importFile.addEventListener('change', (e) => { const file = e.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (ev) => { try { const s = JSON.parse(ev.target.result); for(let k in s) if(document.getElementById(k)) document.getElementById(k).value = s[k]; persistAll(); if(currentShipMode === 'fixed') syncFixedWithDelivery(); calculateAndRender(); showToast('Settings imported'); } catch(e) { showToast('Invalid file'); } }; reader.readAsText(file); importFile.value = ''; });
  }

  function initDark() {
    const dark = localStorage.getItem('darkModeUltimate') === 'true';
    if(dark) document.body.classList.add('dark');
    darkToggle.innerHTML = dark ? '☀️ Light' : '🌙 Dark';
    darkToggle.addEventListener('click', () => { document.body.classList.toggle('dark'); const isDark = document.body.classList.contains('dark'); localStorage.setItem('darkModeUltimate', isDark); darkToggle.innerHTML = isDark ? '☀️ Light' : '🌙 Dark'; });
  }

  function init() {
    loadAll();
    initDark();
    bindEvents();
    setShippingMode('fixed');
    setDelivery('local');
    syncFixedWithDelivery();
    calculateAndRender();
    // PWA Installation Logic
    let deferredPrompt;
    const installContainer = document.getElementById('installContainer');
    const installBtn = document.getElementById('installAppBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installContainer.style.display = 'block';
    });

    if (installBtn) {
      installBtn.addEventListener('click', () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              console.log('User accepted the install prompt');
            } else {
              console.log('User dismissed the install prompt');
            }
            deferredPrompt = null;
            installContainer.style.display = 'none';
          });
        }
      });
    }
  }
  init();
</script>
</body>
</html>
